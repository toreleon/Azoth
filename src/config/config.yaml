# VNStockAgent configuration

# advisory | confirm | auto
# Phase 1 only supports "advisory" — order tools are not yet wired.
autonomy: advisory

# Default Claude model for the orchestrator.
model: claude-sonnet-4-6

# Tickers the agent should track by default.
watchlist:
  - HPG
  - VCB
  - FPT
  - VNM
  - MWG

# Broker selection for later phases. Phase 1: ignored.
broker: paper

# Risk guardrails (used in Phase 4+).
risk:
  max_position_pct: 0.15        # max 15% of portfolio in one ticker
  max_daily_loss_pct: 0.03      # halt trading if down 3% intraday
  max_order_notional_vnd: 50000000
  ticker_whitelist: []          # empty = use watchlist
  allow_margin: false
