# Azoth configuration

# manual | auto
autonomy: manual

# Default model for the orchestrator.
model: glm-5.1

# Multi-agent team model tiers. Research Manager and Portfolio Manager use
# deep_model; analysts, researchers, trader, and risk use quick_model.
team:
  quick_model: glm-5.1
  deep_model: glm-5.1
  output_language: en

# Broker selection.
broker: paper

# Risk guardrails.
risk:
  max_position_pct: 0.15        # max 15% of portfolio in one ticker
  max_daily_loss_pct: 0.03      # halt trading if down 3% intraday
  max_order_notional_vnd: 50000000
  ticker_whitelist: []          # empty = no ticker restriction
  allow_margin: false
